! Shape
Shape.Conical = 圆锥
Shape.Conical.desc1 = 圆锥头锥部面图为三角形.
Shape.Conical.desc2 = 圆锥级间段为直线.
Shape.Ogive = 尖顶拱
Shape.Ogive.desc1 = 尖顶头锥的部面图为圆弧切段. 形状参数1为<b>切面尖拱</b>, 和箭体平滑过渡, 参数小于1为<b>割面尖拱</b>.
Shape.Ogive.desc2 = 尖顶级间段为圆弧切段.  形状参数1为<b>切面尖拱</b>, 和后端箭体平滑过渡, 参数小于1为<b>割面尖拱</b>.
Shape.Ellipsoid = 椭圆体
Shape.Ellipsoid.desc1 = 椭圆头锥的部面图为半椭圆, 长轴是短轴的两倍.
Shape.Ellipsoid.desc2 = 椭圆级间段为半椭圆, 长轴是短轴的两倍.  若未裁剪, 部面图将匹配相应半径.
Shape.Powerseries = 幂级数
Shape.Powerseries.desc1 = 幂级数头锥部面图是由<i>半径</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>长度</i>)<sup><i>k</i></sup>, 其中<i>k</i>是形状参数. <i>k</i>=0.5时为<b>½幂</b>即<b>抛物线</b>, <i>k</i>=0.75时为<b>¾幂</b>, <i>k</i>=1时为<b>圆锥</b>.
Shape.Powerseries.desc2 = 幂级数级间段是由<i>半径</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>长度</i>)<sup><i>k</i></sup>, 其中<i>k</i>是形状参数. <i>k</i>=0.5时为<b>½幂</b>即<b>抛物线</b>, <i>k</i>=0.75时为<b>¾幂</b>, <i>k</i>=1时为<b>圆锥</b>.
Shape.Parabolicseries = 抛物线
Shape.Parabolicseries.desc1 = 抛物线头锥部面图为抛物线. 参数决定了抛物线的形状. 参数1.0为<b>全抛物线</b>, 与箭体相切, 0.75为<b>3/4 抛物线</b>, 0.5 为<b>1/2 抛物线</b>, 0为<b>圆锥</b>.
Shape.Parabolicseries.desc2 = 抛物线级间段为抛物线. 参数决定了抛物线的形状. 参数1.0为<b>全抛物线</b>, 与箭体相切, 0.75为<b>3/4 抛物线</b>, 0.5 为<b>1/2 抛物线</b>, 0为<b>圆锥</b>.
Shape.Haackseries = Haack曲线
Shape.Haackseries.desc1 = Haack级数头锥用于最小化阻力, 形状参数0产生LD-Haack或者冯卡门头锥, 对于既定的长度和直径阻力最小; 形状参数0.333产生LV-Haack头锥, 对于既定的长度和体积阻力最小.
Shape.Haackseries.desc2 = Haack级数头锥用于最小化阻力, 形状参数0产生LD-Haack或者冯卡门头锥, 对于既定的长度和直径阻力最小; 形状参数0.333产生LV-Haack头锥, 对于既定的长度和体积阻力最小.


